# ===== models.yaml =====
# Central registry of all model weights + inference params.
# Heavy models are intentionally absent here until their phase is built
# (pose -> Phase 2, reid/face -> Phase 3, fire/smoke etc -> Phase 4).
# Every entry is a single source of truth loaded by the relevant core/ wrapper.

detector:
  name: yolov8n
  runtime: pytorch                   # pytorch (default — ultralytics NMS wins on detector-only)
                                        # onnx_direct available if needed; onnx via ultralytics also OK
  weights: models/yolov8n.pt            # PyTorch weights (source for export; also used when runtime=pytorch)
  onnx: models/yolov8n.onnx             # FP16 ONNX export (produced by tools/export_onnx.py)
  imgsz: 640                           # 640x640 keeps VRAM low; 960x540 is the upscale-if-needed fallback
  half: true                           # FP16 on CUDA — see hardware budget Section 1
  device: cuda:0
  conf: 0.35
  iou: 0.5
  classes: [0]                          # persons-only — security-camera use case; saves NMS + downstream cost

# --- Phase 2: pose for fall detection ---
# Runs only on person crops from the tracker's boxes, never full frame.
# Same ultralytics family -> same optimizations, single warmup.
pose:
  name: yolov8n-pose
  runtime: onnx_direct               # onnx_direct (default — bypasses ultralytics wrapper; ~44% lower overhead)
                                        # pytorch available as rollback if any accuracy regression
  weights: models/yolov8n-pose.pt      # PyTorch weights
  onnx: models/yolov8n-pose.onnx       # FP16 ONNX export
  imgsz: 160                           # crop-only pose: 160 is small enough that overhead is dominated by model, not letterbox
  half: true                           # FP16 on CUDA
  device: cuda:0
  conf: 0.25                           # lower than detector — pose on a tight crop is harder

# --- Phase 2: fall-detection state machine thresholds ---
# Tuned against real-webcam false-trigger data. The previous values
# (aspect_threshold=1.0, kp_height_frac=0.60, no min_upright_s) fired every
# 4-7 seconds during normal sitting/standing/leaning because:
#   - aspect 1.0-1.2 (slightly crouched) was being classified "horizontal"
#   - sitting puts hips at ~0.55-0.65 of bbox height, below the old 0.60 threshold
#   - a single upright frame during fidgeting re-armed the trigger, so after
#     cooldown the next slightly-horizontal frame fired again
# New values:
fall:
  aspect_threshold: 1.5               # bbox w/h above this = "horizontal"
                                        # standing ~0.4, sitting ~0.8-1.2,
                                        # leaning-forward ~1.0-1.3,
                                        # genuine lying-flat fall ~1.5-2.0+
  keypoint_height_frac: 0.75          # hip/shoulder y at or below this fraction
                                        # of bbox height = "low"
                                        # standing shoulders ~0.05, hips ~0.5;
                                        # sitting hips ~0.55-0.65 (below old 0.60);
                                        # lying-flat ~0.85-0.95
  transition_window_s: 1.5            # UPRIGHT -> FALLEN must complete within this
                                        # to count as a fall (filters slow sit-down)
  cooldown_s: 5.0                      # after a FALL event, suppress re-trigger for this long
  min_upright_s: 1.0                   # NEW: track must be continuously upright for
                                        # at least this long before being eligible to
                                        # fire a fall. A single upright frame during
                                        # fidgeting no longer re-arms the trigger.
  min_conf: 0.30                       # ignore keypoints below this confidence

# Debug: set env FALL_DEBUG=1 to log the next 10 triggers + suppressed
# would-triggers with full signal breakdown (aspect, kp_frac, upright_dur,
# delta). Useful for tuning. Cap via FALL_DEBUG_LIMIT=N.

# --- Phase 3: Person Re-Identification ---
# Lightweight body-embedding model. Uses torchvision ResNet18 (strip FC ->
# 512-dim avgpool features). ~11M params, same scale as YOLOv8n.
# OSNet-x0.25 (3x smaller, purpose-built for ReID) is the production target;
# the architecture supports swapping it in by changing this config block.
reid:
  model: resnet18                        # resnet18 (dev) | osnet_x0_25 (production target)
  device: cuda:0
  half: true                             # FP16 on CUDA
  imgsz: 128                             # ReID crops are small; 128 is standard
  dim: 512                               # embedding dimension
  match_threshold: 0.95                   # cosine sim above this = same person
                                            # NOTE: 0.95 is conservative because ImageNet-pretrained
                                            # ResNet18 features are not person-discriminative — same
                                            # person scores ~0.99, different persons score ~0.94.
                                            # OSNet (trained on ReID datasets) would allow 0.6-0.7.
  lost_ttl_s: 30.0                       # how long to keep lost-track embeddings for re-linking

# --- Phase 3: Face Recognition ---
# Uses insightface buffalo_s pack: SCRFD-500M (det) + MobileFaceNet (rec).
# Models auto-download to ~/.insightface/models/buffalo_s/ on first use (~16MB).
face:
  model_pack: buffalo_s                  # buffalo_s = SCRFD-500M + MobileFaceNet (small variant)
  det_size: 320                          # SCRFD input size; 320 is fast, 640 is more accurate
  dim: 512                               # MobileFaceNet embedding dimension
  match_threshold: 0.4                   # cosine sim above this = same face
  index_path: models/face_index          # where to persist the enrolled-face FAISS index

# --- Phase 4: Fire/Smoke Detection ---
# PLACEHOLDER: Uses HSV color heuristic. Production should use a YOLOv8n
# fine-tuned on a fire/smoke dataset (D-Fire, FireNet, etc.).
# When fine-tuned weights are available, set `weights` to the .pt path and
# the detector will switch to YOLO inference instead of color heuristic.
fire_smoke:
  weights: null                           # null = use HSV heuristic; set path for YOLO
  fire_hsv_low: [0, 100, 150]            # HSV lower bound for fire (orange/red)
  fire_hsv_high: [25, 255, 255]          # HSV upper bound for fire
  fire_min_pixel_ratio: 0.01             # min fraction of frame matching fire to trigger
  fire_min_duration: 2                   # consecutive fire detections required (reduces red-clothing FP)
  # Smoke: tightened to near-white gray only — S<=30 excludes skin/warm tones,
  # V 140-220 excludes very dark and overexposed white. Even after tightening
  # this remains a COARSE PLACEHOLDER — real smoke needs a trained model.
  smoke_hsv_low: [0, 0, 140]             # H: any hue, S: 0 (gray), V: 140 (not dark)
  smoke_hsv_high: [180, 30, 220]         # H: any hue, S: 30 (low sat = gray only), V: 220
  smoke_min_pixel_ratio: 0.60            # 60% of frame must be smoke-colored to trigger
                                          # (was 0.01 — over-triggered on walls/skin/clothing
                                          #  at 0.35-0.71 pixel_ratio in live testing)

# --- Phase 4: Smoking Detection ---
# PLACEHOLDER: Uses cigarette-glow heuristic near face/hand region.
# Production should use a YOLO fine-tuned for cigarette detection.
smoking:
  weights: null                           # null = use glow heuristic; set path for YOLO
  min_object_area: 20                    # min bright-pixel area to flag as cigarette glow
  glow_hsv_low: [0, 100, 200]            # HSV for cigarette ember glow
  glow_hsv_high: [20, 255, 255]

# --- Phase 4: Phone-Watching Detection ---
# Uses a separate YOLOv8n pass for COCO class 67 (cell phone) + head-pose
# heuristic from Phase 2 pose keypoints (nose below shoulder line = looking down).
phone:
  weights: models/yolov8n.pt              # separate YOLOv8n instance, COCO class 67 only
  imgsz: 320                              # small input — phone detection at low cadence
  conf: 0.15                              # lowered from 0.3 — phones at angle/distance rarely reach 0.3
                                          # PHONE_DEBUG=1 env var shows raw confidences to diagnose misses

# --- Phase 4: Personnel Gathering Detection ---
# No model — clusters track centroids with fixed-radius grouping.
gathering:
  min_people: 3                           # minimum cluster size to trigger
  radius_pixels: 150                      # max distance between people in a cluster
  cooldown_s: 10.0                        # suppress re-trigger for the same cluster

# --- Phase 4: Violence/Fighting Detection ---
# PLACEHOLDER: Rule-based heuristic (bbox overlap + rapid relative motion).
# Production should use MoViNet-A0 or a similar lightweight temporal model.
violence:
  # WEAK PLACEHOLDER — even after tightening, cannot distinguish fighting
  # from handshakes/hugs/close conversation. VLM layer (Phase 6) must
  # disambiguate. Real violence detection needs a temporal action model (MoViNet-A0).
  # Thresholds raised based on live false-positive testing (ordinary proximity
  # + talking between 2 people triggered 3 false positives at old values):
  iou_threshold: 0.3                      # was 0.1 — raised to require real bbox overlap
  motion_threshold: 40.0                 # was 15.0 — raised to require rapid movement
  window_s: 1.5                           # was 1.0 — must sustain for 1.5s continuously
  cooldown_s: 10.0                        # suppress re-trigger