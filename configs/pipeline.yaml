# ===== pipeline.yaml =====
# Runtime behavior of the real-time loop. Every feature module is toggleable
# here (constraint #6) so Phases 2+ get added without code changes to main_loop.

source:
  type: webcam          # webcam | file | rtsp
  path: null            # used for `file` and `rtsp`
  loop: true            # restart file on EOF (let accuracy tests run indefinitely)
  reconnect: true       # rtsp only — auto-reconnect
  width: 1280
  height: 720

display:
  enabled: true
  resize_w: 960         # display-only upscale; inference stays at detector.imgsz
  show_fps: true
  show_vram: true
  window: "ai-surveillance (Phase 4)"

# ---- FrameRouter: every stage runs through this scheduler (constraint #4) ----
# frequency is expressed as `every: N` meaning run once every N frames.
# 1 = every frame. Heavier stage entries are present but disabled (enabled:false)
# so adding a phase is: flip enabled + set every.
router:
  stages:
    detect:
      enabled: true
      every: 1            # every frame — feeds everything downstream
    track:
      enabled: true
      every: 1            # ByteTrack is CPU-cheap
    pose:
      enabled: true
      every: 2            # every other frame — halves pose overhead
    reid:
      enabled: true
      every: 10           # only on new/re-appearing tracks (Section 4) — not every frame
    face:
      enabled: true
      every: 4            # every 3rd-5th frame on person crops (Section 4)
    fire_smoke:
      enabled: true
      every: 15           # 1-2 fps at 30fps source — slow-evolving event
    smoking:
      enabled: true
      every: 10           # 3 fps — low urgency
    phone:
      enabled: true
      every: 10           # 3 fps — low urgency. Uses a SEPARATE YOLOv8n model
                            # instance dedicated to COCO class 67 (cell phone).
                            # The old sharing conflict (tracker model + phone classes=[67])
                            # is resolved: PhoneWatcherDetector always loads its own
                            # independent YOLO instance and ignores any shared model.
    gathering:
      enabled: true
      every: 30           # 1 fps — aggregate stat
    violence:
      enabled: true
      every: 3            # every 3rd frame — needs temporal continuity, but cheaper than pose

features:
  detection: true
  tracking: true
  pose: true
  fall_detection: true
  reid: true
  face: true
  identity_fusion: true
  fire_smoke: true
  smoking: true
  phone: true
  gathering: true
  violence: true

perf:
  fps_warn_below: 20    # log a warning if sustained FPS drops below this
  vram_log_path: benchmarks/vram_log.csv
  vram_warn_above_gb: 5 # constraint #2 — flag if exceeded
  vram_log_every_s: 5   # how often to append a VRAM sample